services:
  - type: web
    name: portfolio-backend
    runtime: docker
    repo: # set in Render UI
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OWNER_EMAIL
        value: nicholask39@gmail.com
      - key: CALENDLY_URL
        value: https://calendly.com/nicholask39/30min
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: RATE_LIMIT_PER_MIN
        value: "30"
      - key: RATE_LIMIT_PER_DAY_PER_IP
        value: "60"
      - key: RATE_LIMIT_PER_DAY_GLOBAL
        value: "1000"
      - key: MAX_TOTAL_CHARS_PER_REQUEST
        value: "20000"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
    # Free tier doesn't support preDeployCommand; the Dockerfile CMD runs
    # `alembic upgrade head && python -m app.ingest` on every container start
    # instead. Both are idempotent.

databases:
  - name: portfolio-db
    plan: free
    postgresMajorVersion: 16
